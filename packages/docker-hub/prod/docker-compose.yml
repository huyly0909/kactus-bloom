services:
  bloom-app:
    build:
      context: ../../
      dockerfile: packages/docker-hub/Dockerfile.bloom-app
      args:
        - VITE_API_BASE_URL=${VITE_API_BASE_URL}
        - VITE_WS_BASE_URL=${VITE_WS_BASE_URL}
        - VITE_APP_NAME=${VITE_APP_NAME}
    env_file: .env
    ports:
      - "80:80"
    restart: always
    deploy:
      resources:
        limits:
          memory: 256M
